<!DOCTYPE html>
<html>
<head>
    <title>Tablet Reminder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>💊 Tablet Reminder</h1>

<input id="tablet" type="text" placeholder="Tablet Name">

<textarea id="message" placeholder="Reminder Message"></textarea>

<input id="time" type="time">
<label>Select Reminder Tone</label>

<input
id="tone"
type="file"
accept="audio/*">

<button onclick="saveReminder()">
Save Reminder
</button>

<div id="list"></div>

</div>

<div>

<button onclick="snoozeReminder()">
Snooze 5 min
</button>

<button onclick="stopReminder()">
Stop
</button>

</div>

<script src="script.js"></script>

</body>
</html>
